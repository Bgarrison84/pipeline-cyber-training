<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OT Security Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/src/style.css" />
</head>
<body class="bg-[var(--color-bg-base)] text-[var(--color-text-primary)] h-screen overflow-hidden">
  <div id="shell" class="grid h-screen"
       style="grid-template-columns: var(--sidebar-width-expanded) 1fr; grid-template-rows: var(--topbar-height) 1fr;">
    <header id="top-bar" class="col-span-2 flex items-center justify-between px-[var(--spacing-md)]"
            style="background: var(--color-bg-secondary); border-bottom: 1px solid var(--color-border); position: sticky; top: 0; z-index: 50;">
      <span style="font-size: var(--text-display); font-weight: 600; color: var(--color-accent);">OT Security Lab</span>
      <div class="flex items-center gap-[var(--spacing-md)]">
        <a href="#/compliance-index"
           style="font-size: var(--text-body); color: var(--color-text-muted); text-decoration: none; display: flex; align-items: center; gap: 4px;"
           onmouseover="this.style.color='var(--color-accent)'"
           onmouseout="this.style.color='var(--color-text-muted)'">
          <i data-lucide="shield-check" style="width:15px;height:15px;"></i>
          Compliance Index
        </a>
        <a href="#/completion-summary"
           style="font-size: var(--text-body); color: var(--color-text-muted); text-decoration: none; display: flex; align-items: center; gap: 4px;"
           onmouseover="this.style.color='var(--color-accent)'"
           onmouseout="this.style.color='var(--color-text-muted)'">
          <i data-lucide="printer" style="width:15px;height:15px;"></i>
          Training Log
        </a>
      </div>
    </header>
    <nav id="sidebar" aria-label="Module navigation"
         style="background: var(--color-bg-secondary); border-right: 1px solid var(--color-border); display: flex; flex-direction: column; overflow: hidden;">
      <div id="sidebar-modules" style="flex: 1; overflow-y: auto;"></div>
      <button id="sidebar-toggle" aria-label="Collapse navigation"
              style="width: 100%; height: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center; border-top: 1px solid var(--color-border); background: transparent; cursor: pointer; color: var(--color-text-muted);">
        <i data-lucide="chevron-left" style="width: 20px; height: 20px;"></i>
      </button>
    </nav>
    <main id="app" role="main" style="overflow-y: auto;"></main>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
